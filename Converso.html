<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Converso</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system;
  background:#343541;
  color:white;
  display:flex;
  height:100vh;
}
#sidebar{
  width:260px;
  background:#202123;
  padding:15px;
  display:flex;
  flex-direction:column;
}
#newChat{
  padding:10px;
  border:1px solid #444;
  border-radius:6px;
  cursor:pointer;
  margin-bottom:15px;
  text-align:center;
}
#newChat:hover{background:#2a2b32}
.chatItem{
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  margin-bottom:5px;
}
.chatItem:hover{background:#2a2b32}
.activeChat{background:#2a2b32}
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}
header{
  padding:15px;
  text-align:center;
  background:#202123;
  font-weight:600;
}
#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}
.message{display:flex;margin:15px 0;}
.user{justify-content:flex-end}
.bot{justify-content:flex-start}
.bubble{
  max-width:70%;
  padding:14px;
  border-radius:10px;
  white-space:pre-wrap;
  line-height:1.4;
}
.user .bubble{background:#2563eb}
.bot .bubble{background:#444654}
pre{
  background:#111;
  padding:10px;
  border-radius:6px;
  overflow-x:auto;
  margin-top:8px;
}
#inputBar{
  display:flex;
  padding:15px;
  background:#202123;
}
#userInput{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
  font-size:15px;
}
button{
  margin-left:10px;
  padding:12px 16px;
  border:none;
  border-radius:8px;
  background:#10a37f;
  color:white;
  cursor:pointer;
}
button:hover{opacity:.9}
</style>
</head>
<body>
<div class="scrollmenu">
<a href="#home"><a href="Home.html">Home</a>&nbsp;&nbsp;
<a href="#Converso Chatbot"><a href="Converso.html">Converso Chatbot</a>&nbsp;&nbsp;
<a href="#Games"><a href="Games.html">Converso Store</a>&nbsp;&nbsp;
</div>

<div id="sidebar">
  <div id="newChat">+ New Chat</div>
  <div id="chatList"></div>
</div>

<div id="main">
  <header>💬 Converso</header>
  <div id="chat"></div>
  <div id="inputBar">
    <input id="userInput" placeholder="Type a message or math problem...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let conversations = JSON.parse(localStorage.getItem("converso_chats") || "{}");
let currentChatId = null;
const chatDiv = document.getElementById("chat");
const chatList = document.getElementById("chatList");

/* ---------- SAFE MATH ---------- */
function evaluateExpression(expr){
  expr = expr.toLowerCase();
  expr = expr.replace(/sqrt\(([^)]+)\)/g, (_,n)=>Math.sqrt(parseFloat(n)));
  expr = expr.replace(/(\d+)%\s*of\s*(\d+)/g, (_,a,b)=>(a/100)*b);
  expr = expr.replace(/\^/g,"**");
  if(!/^[0-9+\-*/().*\s]+$/.test(expr)) return null;
  try{
    return Function('"use strict";return (' + expr + ')')();
  }catch{return null;}
}

/* ---------- RESPONSE ENGINE ---------- */
function generateResponse(text){
  const lower = text.toLowerCase().trim();

  // 1️⃣ Time
  if(lower.includes("time") || lower.includes("what time")){
    const now = new Date();
    return "⏰ Current time: " + now.toLocaleTimeString();
  }

  // 2️⃣ Date
  if(lower.includes("date") || lower.includes("day")){
    const now = new Date();
    return "📅 Today is: " + now.toLocaleDateString(undefined, {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  }

  // 3️⃣ Math
  const math = evaluateExpression(lower);
  if(math !== null && math !== undefined){
    return "🧮 Result: <b>" + math + "</b>";
  }

  // 4️⃣ Greetings
  if(lower.includes("hello") || lower.includes("hi")){
    return "Hello 👋 How can I help you?";
  }

  // 5️⃣ Fallback
  return "I can calculate math, tell the time or date, and answer basic questions.";
}

/* ---------- UI LOGIC ---------- */
function saveChats(){ localStorage.setItem("converso_chats", JSON.stringify(conversations)); }

function createNewChat(){
  const id = "chat_" + Date.now();
  conversations[id] = [];
  currentChatId = id;
  saveChats();
  renderSidebar();
  renderChat();
}

function renderSidebar(){
  chatList.innerHTML = "";
  Object.keys(conversations).reverse().forEach(id=>{
    const div = document.createElement("div");
    div.className = "chatItem" + (id === currentChatId ? " activeChat" : "");
    div.innerText = "Conversation";
    div.onclick = ()=>{
      currentChatId = id;
      renderSidebar();
      renderChat();
    };
    chatList.appendChild(div);
  });
}

function renderChat(){
  chatDiv.innerHTML = "";
  if(!currentChatId) return;
  conversations[currentChatId].forEach(msg=>{
    addMessage(msg.text, msg.role, false);
  });
}

function addMessage(text, role, save=true){
  const msg = document.createElement("div");
  msg.className = "message " + (role==="user"?"user":"bot");
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = text.replace(/\n/g,"<br>");
  msg.appendChild(bubble);
  chatDiv.appendChild(msg);
  chatDiv.scrollTop = chatDiv.scrollHeight;
  if(save){
    conversations[currentChatId].push({text, role});
    saveChats();
  }
  return bubble;
}

async function streamText(el,text){
  el.innerHTML="";
  for(let i=0;i<text.length;i++){
    el.innerHTML+=text[i];
    chatDiv.scrollTop=chatDiv.scrollHeight;
    await new Promise(r=>setTimeout(r,6));
  }
}

async function sendMessage(){
  const input=document.getElementById("userInput");
  const text=input.value.trim();
  if(!text||!currentChatId) return;
  input.value="";
  addMessage(text,"user");
  const bubble = addMessage("Thinking...","bot");
  const response = generateResponse(text);
  await streamText(bubble,response);
  conversations[currentChatId][conversations[currentChatId].length-1].text=response;
  saveChats();
}

document.getElementById("newChat").onclick = createNewChat;
document.getElementById("userInput").addEventListener("keydown", e=>{
  if(e.key==="Enter") sendMessage();
});

if(Object.keys(conversations).length===0){
  createNewChat();
}else{
  currentChatId=Object.keys(conversations)[0];
  renderSidebar();
  renderChat();
}
</script>

<script>
const siteName = "ConversoAI";

let userId = localStorage.getItem("tracker_user");

if (!userId) {
  userId = Math.random().toString(36).substring(2);
  localStorage.setItem("tracker_user", userId);
}

function track() {
  fetch("https://YOUR-TRACKER-SERVER.com/track", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      site: siteName,
      page: window.location.pathname,
      user: userId
    })
  });
}

track();
setInterval(track, 10000);
</script>
</body>
</html>
