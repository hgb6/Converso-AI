<script>
let conversations = JSON.parse(localStorage.getItem("converso_chats") || "{}");
let currentChatId = null;

const chatDiv = document.getElementById("chat");
const chatList = document.getElementById("chatList");

/* ---------- KNOWLEDGE BASE ---------- */
const knowledge = {
  "earth": "Earth is the third planet from the Sun and the only known planet to support life.",
  "sun": "The Sun is a star at the center of our solar system.",
  "moon": "The Moon is Earth's only natural satellite.",
  "water": "Water is a chemical compound composed of H2O.",
  "gravity": "Gravity is a force that attracts objects with mass toward each other.",
  "einstein": "Albert Einstein developed the theory of relativity.",
  "newton": "Isaac Newton formulated the laws of motion and universal gravitation.",
  "photosynthesis": "Photosynthesis is the process plants use to convert sunlight into energy.",
  "atom": "An atom is the smallest unit of ordinary matter.",
  "javascript": "JavaScript is a programming language used to create interactive web pages.",
  "html": "HTML stands for HyperText Markup Language.",
  "css": "CSS stands for Cascading Style Sheets.",
  "python": "Python is a high-level programming language known for readability.",
  "world war 2": "World War II lasted from 1939 to 1945.",
  "light": "Light is electromagnetic radiation visible to the human eye.",
  "speed of light": "The speed of light is approximately 299,792,458 meters per second."
};

/* ---------- SAFE MATH ---------- */
function evaluateExpression(expr){
  expr = expr.toLowerCase();
  expr = expr.replace(/sqrt\(([^)]+)\)/g, (_,n)=>Math.sqrt(parseFloat(n)));
  expr = expr.replace(/(\d+)%\s*of\s*(\d+)/g, (_,a,b)=>(a/100)*b);
  expr = expr.replace(/\^/g,"**");

  if(!/^[0-9+\-*/().*\s]+$/.test(expr)) return null;

  try{
    return Function('"use strict";return (' + expr + ')')();
  }catch{
    return null;
  }
}

/* ---------- RESPONSE ENGINE ---------- */
function generateResponse(text){
  const lower = text.toLowerCase().trim();

  /* 1️⃣ Math detection */
  const math = evaluateExpression(lower);
  if(math !== null && math !== undefined){
    return "🧮 Result: <b>" + math + "</b>";
  }

  /* 2️⃣ Knowledge lookup */
  for(const key in knowledge){
    if(lower.includes(key)){
      return "📘 " + knowledge[key];
    }
  }

  /* 3️⃣ Explanation mode */
  if(lower.startsWith("what is") || lower.startsWith("who is")){
    return "I don't have that in my local database yet. Add it to the knowledge base to expand me.";
  }

  /* 4️⃣ Smart structured responses */
  if(lower.includes("explain")){
    return "Here’s a structured explanation:\n\n1. Definition\n2. Key Components\n3. Real-world Example\n4. Why It Matters";
  }

  if(lower.includes("how to")){
    return "Step-by-step guide:\n1. Understand the goal\n2. Gather resources\n3. Execute carefully\n4. Review results";
  }

  /* 5️⃣ Fallback */
  return "I process math, science, history, and tech. Ask me something specific!";
}

/* ---------- UI LOGIC ---------- */
function saveChats(){
  localStorage.setItem("converso_chats", JSON.stringify(conversations));
}

function createNewChat(){
  const id = "chat_" + Date.now();
  conversations[id] = [];
  currentChatId = id;
  saveChats();
  renderSidebar();
  renderChat();
}

function renderSidebar(){
  chatList.innerHTML = "";
  Object.keys(conversations).reverse().forEach(id=>{
    const div = document.createElement("div");
    div.className = "chatItem" + (id === currentChatId ? " activeChat" : "");
    div.innerText = "Conversation";
    div.onclick = ()=>{
      currentChatId = id;
      renderSidebar();
      renderChat();
    };
    chatList.appendChild(div);
  });
}

function renderChat(){
  chatDiv.innerHTML = "";
  if(!currentChatId) return;
  conversations[currentChatId].forEach(msg=>{
    addMessage(msg.text, msg.role, false);
  });
}

function addMessage(text, role, save=true){
  const msg = document.createElement("div");
  msg.className = "message " + (role === "user" ? "user" : "bot");
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = text.replace(/\n/g,"<br>");
  msg.appendChild(bubble);
  chatDiv.appendChild(msg);
  chatDiv.scrollTop = chatDiv.scrollHeight;

  if(save){
    conversations[currentChatId].push({text, role});
    saveChats();
  }
  return bubble;
}

async function streamText(el,text){
  el.innerHTML="";
  for(let i=0;i<text.length;i++){
    el.innerHTML+=text[i];
    chatDiv.scrollTop=chatDiv.scrollHeight;
    await new Promise(r=>setTimeout(r,6));
  }
}

async function sendMessage(){
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text || !currentChatId) return;
  input.value="";
  addMessage(text,"user");
  const bubble = addMessage("Thinking...","bot");
  const response = generateResponse(text);
  await streamText(bubble,response);
  conversations[currentChatId][conversations[currentChatId].length-1].text=response;
  saveChats();
}

document.getElementById("newChat").onclick=createNewChat;
document.getElementById("userInput").addEventListener("keydown",e=>{
  if(e.key==="Enter") sendMessage();
});

if(Object.keys(conversations).length===0){
  createNewChat();
}else{
  currentChatId=Object.keys(conversations)[0];
  renderSidebar();
  renderChat();
}
</script>
