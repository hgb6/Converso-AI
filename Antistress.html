<!DOCTYPE html>
<html>
<head>
<title>Anti-Stress Game Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  text-align:center;
  margin:0;
  padding:0;
}

/* BUTTONS */
button{
  padding:12px 22px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:18px;
}

/* GAME AREA */
#gameArea{
  margin-top:20px;
  position: relative;
  min-height:300px;
}

/* BUBBLE POP */
.bubble{
  width:60px;
  height:60px;
  border-radius:50%;
  position:absolute;
  cursor:pointer;
}

/* CANVAS FOR DRAWING */
#canvas{
  border:2px solid white;
  background:white;
  max-width:100%;
  height:auto;
}

/* WHACK-A-MOLE */
.mole{
  width:70px;
  height:70px;
  background:brown;
  border-radius:50%;
  display:inline-block;
  margin:20px;
  cursor:pointer;
}

/* SCROLL MENU */
.scrollmenu{
  background:#202123;
  padding:10px;
  overflow-x:auto;
  white-space:nowrap;
  margin-top:10px;
}

.scrollmenu a{
  color:white;
  text-decoration:none;
  margin-right:15px;
  font-weight:bold;
  font-size:16px;
}

.scrollmenu a:hover{
  color:lightgray;
}

/* PAGE TITLE */
h1{
  font-size:28px;
  margin-top:20px;
}

/* MOBILE RESPONSIVE STYLES */
@media (max-width:700px){
  h1{
    font-size:24px;
  }

  button{
    font-size:16px;
    padding:10px 16px;
  }

  .bubble{
    width:50px;
    height:50px;
  }

  .mole{
    width:50px;
    height:50px;
    margin:12px;
  }

  #canvas{
    width:90%;
    height:auto;
  }

  .scrollmenu a{
    font-size:14px;
    margin-right:10px;
  }
}
</style>
</head>
<body>

<h1>🧠 Anti-Stress Game Hub</h1>

<div>
<button onclick="bubbleGame()">Bubble Pop</button>
<button onclick="colorGame()">Color Click</button>
<button onclick="drawGame()">Drawing Pad</button>
<button onclick="fidgetGame()">Fidget Button</button>
<button onclick="moleGame()">Whack-a-Mole</button>
</div>

<div class="scrollmenu">
<a href="https://hgb6.github.io/Converso-AI/Home.html">Home</a>
<a href="https://hgb6.github.io/Converso-AI/Converso.html">Converso Chatbot</a> 
<a href="http://hgb6.github.io/Converso-AI/Games.html">Games</a>
</div>

<div id="gameArea"></div>

<script>
const gameArea = document.getElementById("gameArea")

function clearGame(){
  gameArea.innerHTML=""
}

/* Bubble Pop */
function bubbleGame(){
  clearGame()
  for(let i=0;i<15;i++){
    let bubble = document.createElement("div")
    bubble.className="bubble"
    bubble.style.background = `hsl(${Math.random()*360},70%,60%)`
    bubble.style.left = Math.random()*90+"%"
    bubble.style.top = Math.random()*70+"%"
    bubble.onclick=()=>{ bubble.remove() }
    gameArea.appendChild(bubble)
  }
}

/* Color Click */
function colorGame(){
  clearGame()
  let box = document.createElement("div")
  box.style.width="200px"
  box.style.height="200px"
  box.style.margin="auto"
  box.style.cursor="pointer"
  function change(){
    box.style.background = `hsl(${Math.random()*360},70%,60%)`
  }
  box.onclick=change
  change()
  gameArea.appendChild(box)
}

/* Drawing Pad */
function drawGame(){
  clearGame()
  let canvas = document.createElement("canvas")
  canvas.id="canvas"
  canvas.width=500
  canvas.height=400
  gameArea.appendChild(canvas)
  let ctx = canvas.getContext("2d")
  let drawing=false
  canvas.onmousedown=()=>drawing=true
  canvas.onmouseup=()=>drawing=false
  canvas.onmousemove=(e)=>{
    if(!drawing) return
    ctx.fillStyle="black"
    ctx.beginPath()
    ctx.arc(e.offsetX,e.offsetY,3,0,Math.PI*2)
    ctx.fill()
  }
}

/* Fidget Button */
function fidgetGame(){
  clearGame()
  let btn = document.createElement("button")
  btn.textContent="CLICK ME!"
  let count=0
  btn.onclick=()=>{
    count++
    btn.textContent="Clicks: "+count
  }
  gameArea.appendChild(btn)
}

/* Whack a Mole */
function moleGame(){
  clearGame()
  for(let i=0;i<6;i++){
    let mole=document.createElement("div")
    mole.className="mole"
    mole.onclick=()=>{ mole.style.background="green" }
    gameArea.appendChild(mole)
  }
}
</script>
</body>
</html>
