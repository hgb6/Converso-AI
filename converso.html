<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Converso</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system;
  background:#343541;
  color:white;
  display:flex;
  height:100vh;
}

/* Sidebar */
#sidebar{
  width:260px;
  background:#202123;
  padding:15px;
  display:flex;
  flex-direction:column;
}

#newChat{
  padding:10px;
  border:1px solid #444;
  border-radius:6px;
  cursor:pointer;
  margin-bottom:15px;
  text-align:center;
}
#newChat:hover{background:#2a2b32}

.chatItem{
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  margin-bottom:5px;
}
.chatItem:hover{background:#2a2b32}
.activeChat{background:#2a2b32}

/* Main area */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

header{
  padding:15px;
  text-align:center;
  background:#202123;
  font-weight:600;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  display:flex;
  margin:15px 0;
}

.user{justify-content:flex-end}
.bot{justify-content:flex-start}

.bubble{
  max-width:70%;
  padding:14px;
  border-radius:10px;
  white-space:pre-wrap;
  line-height:1.4;
}
.user .bubble{background:#2563eb}
.bot .bubble{background:#444654}

/* Code block */
pre{
  background:#111;
  padding:10px;
  border-radius:6px;
  overflow-x:auto;
  margin-top:8px;
}

/* Input */
#inputBar{
  display:flex;
  padding:15px;
  background:#202123;
}
#userInput{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
  font-size:15px;
}
button{
  margin-left:10px;
  padding:12px 16px;
  border:none;
  border-radius:8px;
  background:#10a37f;
  color:white;
  cursor:pointer;
}
button:hover{opacity:.9}
</style>
</head>
<body>

<div id="sidebar">
  <div id="newChat">+ New Chat</div>
  <div id="chatList"></div>
</div>

<div id="main">
  <header>💬 Converso</header>
  <div id="chat"></div>
  <div id="inputBar">
    <input id="userInput" placeholder="Send a message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let conversations = JSON.parse(localStorage.getItem("converso_chats") || "{}");
let currentChatId = null;

const chatDiv = document.getElementById("chat");
const chatList = document.getElementById("chatList");

function saveChats(){
  localStorage.setItem("converso_chats", JSON.stringify(conversations));
}

function createNewChat(){
  const id = "chat_" + Date.now();
  conversations[id] = [];
  currentChatId = id;
  saveChats();
  renderSidebar();
  renderChat();
}

function renderSidebar(){
  chatList.innerHTML = "";
  Object.keys(conversations).reverse().forEach(id=>{
    const div = document.createElement("div");
    div.className = "chatItem" + (id === currentChatId ? " activeChat" : "");
    div.innerText = "Conversation";
    div.onclick = ()=>{
      currentChatId = id;
      renderSidebar();
      renderChat();
    };
    chatList.appendChild(div);
  });
}

function renderChat(){
  chatDiv.innerHTML = "";
  if(!currentChatId) return;
  conversations[currentChatId].forEach(msg=>{
    addMessage(msg.text, msg.role, false);
  });
}

function addMessage(text, role, save=true){
  const msg = document.createElement("div");
  msg.className = "message " + (role === "user" ? "user" : "bot");

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = formatText(text);

  msg.appendChild(bubble);
  chatDiv.appendChild(msg);
  chatDiv.scrollTop = chatDiv.scrollHeight;

  if(save){
    conversations[currentChatId].push({text, role});
    saveChats();
  }

  return bubble;
}

function formatText(text){
  return text.replace(/```([\s\S]*?)```/g, "<pre>$1</pre>");
}

function random(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

/* Converso Brain (Offline Simulation) */
function generateResponse(text){
  const lower = text.toLowerCase();

  if(lower.includes("hello") || lower.includes("hi"))
    return "Hello 👋 What would you like to talk about?";

  if(lower.includes("code"))
    return "Here’s a simple example:\n```js\nconsole.log('Hello world');\n```";

  if(lower.includes("story"))
    return "Once upon a time, someone started a conversation that led to something unexpected.";

  if(lower.includes("explain"))
    return "Sure. Let's break it down step by step:\n1. Understand the idea\n2. Analyze the details\n3. Draw a conclusion";

  if(lower.includes("math")){
    try{
      const expression = text.replace(/[^-()\d/*+.]/g,"");
      const result = eval(expression);
      if(result !== undefined) return "Result: " + result;
    }catch{}
  }

  const generic = [
    "Interesting thought.",
    "Tell me more.",
    "What makes you say that?",
    "Let's explore that idea.",
    "Can you clarify?"
  ];

  return random(generic);
}

/* Typing Effect */
async function streamText(element, text){
  element.innerHTML = "";
  for(let i=0;i<text.length;i++){
    element.innerHTML += text[i];
    chatDiv.scrollTop = chatDiv.scrollHeight;
    await new Promise(r=>setTimeout(r,10));
  }
}

async function sendMessage(){
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text || !currentChatId) return;

  input.value = "";
  addMessage(text, "user");

  const bubble = addMessage("Thinking...", "bot");
  const response = generateResponse(text);

  await streamText(bubble, response);

  conversations[currentChatId][conversations[currentChatId].length-1].text = response;
  saveChats();
}

document.getElementById("newChat").onclick = createNewChat;

document.getElementById("userInput").addEventListener("keydown", e=>{
  if(e.key === "Enter") sendMessage();
});

if(Object.keys(conversations).length === 0){
  createNewChat();
}else{
  currentChatId = Object.keys(conversations)[0];
  renderSidebar();
  renderChat();
}
</script>

</body>
</html>
