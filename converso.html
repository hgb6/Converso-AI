<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Converso</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system;
  background:#343541;
  color:white;
  display:flex;
  height:100vh;
}
#sidebar{
  width:260px;
  background:#202123;
  padding:15px;
  display:flex;
  flex-direction:column;
}
#newChat{
  padding:10px;
  border:1px solid #444;
  border-radius:6px;
  cursor:pointer;
  margin-bottom:15px;
  text-align:center;
}
#newChat:hover{background:#2a2b32}
.chatItem{
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  margin-bottom:5px;
}
.chatItem:hover{background:#2a2b32}
.activeChat{background:#2a2b32}
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}
header{
  padding:15px;
  text-align:center;
  background:#202123;
  font-weight:600;
}
#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}
.message{display:flex;margin:15px 0;}
.user{justify-content:flex-end}
.bot{justify-content:flex-start}
.bubble{
  max-width:70%;
  padding:14px;
  border-radius:10px;
  white-space:pre-wrap;
  line-height:1.4;
}
.user .bubble{background:#2563eb}
.bot .bubble{background:#444654}
pre{
  background:#111;
  padding:10px;
  border-radius:6px;
  overflow-x:auto;
  margin-top:8px;
}
#inputBar{
  display:flex;
  padding:15px;
  background:#202123;
}
#userInput{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
  font-size:15px;
}
button{
  margin-left:10px;
  padding:12px 16px;
  border:none;
  border-radius:8px;
  background:#10a37f;
  color:white;
  cursor:pointer;
}
button:hover{opacity:.9}
</style>
</head>
<body>

<div id="sidebar">
  <div id="newChat">+ New Chat</div>
  <div id="chatList"></div>
</div>

<div id="main">
  <header>💬 Converso</header>
  <div id="chat"></div>
  <div id="inputBar">
    <input id="userInput" placeholder="Type a message or math problem...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let conversations = JSON.parse(localStorage.getItem("converso_chats") || "{}");
let currentChatId = null;
const chatDiv = document.getElementById("chat");
const chatList = document.getElementById("chatList");

function saveChats(){
  localStorage.setItem("converso_chats", JSON.stringify(conversations));
}

function createNewChat(){
  const id = "chat_" + Date.now();
  conversations[id] = [];
  currentChatId = id;
  saveChats();
  renderSidebar();
  renderChat();
}

function renderSidebar(){
  chatList.innerHTML = "";
  Object.keys(conversations).reverse().forEach(id=>{
    const div = document.createElement("div");
    div.className = "chatItem" + (id === currentChatId ? " activeChat" : "");
    div.innerText = "Conversation";
    div.onclick = ()=>{
      currentChatId = id;
      renderSidebar();
      renderChat();
    };
    chatList.appendChild(div);
  });
}

function renderChat(){
  chatDiv.innerHTML = "";
  if(!currentChatId) return;
  conversations[currentChatId].forEach(msg=>{
    addMessage(msg.text, msg.role, false);
  });
}

function addMessage(text, role, save=true){
  const msg = document.createElement("div");
  msg.className = "message " + (role === "user" ? "user" : "bot");
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = text;
  msg.appendChild(bubble);
  chatDiv.appendChild(msg);
  chatDiv.scrollTop = chatDiv.scrollHeight;
  if(save){
    conversations[currentChatId].push({text, role});
    saveChats();
  }
  return bubble;
}

/* SAFE MATH PARSER */
function evaluateExpression(expr){
  expr = expr.toLowerCase();
  expr = expr.replace(/sqrt\(([^)]+)\)/g, (_,num)=>Math.sqrt(parseFloat(num)));
  expr = expr.replace(/(\d+)%\s*of\s*(\d+)/g, (_,a,b)=>(a/100)*b);
  expr = expr.replace(/\^/g,"**");

  if(!/^[0-9+\-*/().*\s]+$/.test(expr)) return null;

  try{
    return Function('"use strict";return (' + expr + ')')();
  }catch{
    return null;
  }
}

function generateResponse(text){
  const lower = text.toLowerCase().trim();

  const mathResult = evaluateExpression(lower);
  if(mathResult !== null && mathResult !== undefined){
    return "🧮 Result: <b>" + mathResult + "</b>";
  }

  if(lower.includes("hello") || lower.includes("hi"))
    return "Hello 👋 What would you like to calculate or discuss?";

  if(lower.includes("story"))
    return "Once upon a time, numbers came to life and formed their own equations.";

  return "I'm ready to solve math problems. Try something like: (5+3)*2 or sqrt(49)";
}

async function streamText(element, text){
  element.innerHTML = "";
  for(let i=0;i<text.length;i++){
    element.innerHTML += text[i];
    chatDiv.scrollTop = chatDiv.scrollHeight;
    await new Promise(r=>setTimeout(r,8));
  }
}

async function sendMessage(){
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text || !currentChatId) return;
  input.value = "";
  addMessage(text, "user");
  const bubble = addMessage("Calculating...", "bot");
  const response = generateResponse(text);
  await streamText(bubble, response);
  conversations[currentChatId][conversations[currentChatId].length-1].text = response;
  saveChats();
}

document.getElementById("newChat").onclick = createNewChat;
document.getElementById("userInput").addEventListener("keydown", e=>{
  if(e.key === "Enter") sendMessage();
});

if(Object.keys(conversations).length === 0){
  createNewChat();
}else{
  currentChatId = Object.keys(conversations)[0];
  renderSidebar();
  renderChat();
}
</script>

</body>
</html>
