<!DOCTYPE html>
<html>
<head>
<title>🧺Converso Store</title>                  
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background-image: url("Converso AI.png"); 
    background-size: cover;                                                       
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-position: center top;
    font-family: Arial, sans-serif;
    color: white;
    margin:0;
    padding:0;
}

/* white links */
a{
    color: white;
    text-decoration: none;
}

a:hover{
    color: lightgray;
}

/* top menu */
.scrollmenu{
    background:#202123;
    padding:12px;
    overflow-x:auto;
    white-space:nowrap;
}

.scrollmenu a{
    margin-right: 15px;
    font-weight: bold;
    font-size:16px;
}

/* page title */
h1{
    text-align:center;
    margin:20px 0;
    font-size:28px;
}

/* game store layout */
.games{
    display: flex;
    gap: 30px;
    margin: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

/* game card */
.game{
    text-align: center;
    flex: 1 1 200px; /* flexible width for small screens */
    max-width: 250px;
}

/* game image */
.game img{
    width: 100%;
    border-radius: 10px;
    max-width:200px;
    height:auto;
}

/* MOBILE RESPONSIVE STYLES */
@media (max-width:700px){
    h1{
        font-size:24px;
    }

    .scrollmenu a{
        font-size:14px;
    }

    .games{
        gap:20px;
        margin:10px;
    }

    .game img{
        max-width:150px;
    }

    .game{
        flex: 1 1 140px;
    }
}
</style>

</head>

<body>

<div class="scrollmenu">
<a href="https://hgb6.github.io/Converso/">Home</a>
<a href="Converso.html">Converso Chatbot</a>
<a href="Games.html">Converso Store</a>
</div>

<h1>🧺Converso Store</h1>

<div class="games">

<div class="game">
<a href="Ping-Pong-World-Tour.html">
<img src="pingpong.webp" alt="Ping Pong World Tour">
<br>🏓 Ping Pong World Tour
</a>
</div>

<div class="game">
<a href="Antistress.html">
<img src="antistress.jpeg" alt="Antistress">
<br>🧸 Antistress
</a>
</div>

</div>

</body>
</html>
